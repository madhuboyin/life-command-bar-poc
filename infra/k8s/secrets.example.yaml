apiVersion: v1
kind: Secret
metadata:
  name: lcb-secrets
  namespace: life-command
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:yourpassword@postgres:5432/lcb_poc?schema=public"
  LLM_API_KEY: "your_llm_key"
  AUTH_SECRET: "replace_with_32_plus_char_secret"
  API_AUTH_TOKEN_SECRET: "replace_with_32_plus_char_secret_optional"
  AUTH_GOOGLE_ID: "your_google_oauth_client_id"
  AUTH_GOOGLE_SECRET: "your_google_oauth_client_secret"
  GOOGLE_OAUTH_CLIENT_ID: "your_gmail_oauth_client_id"
  GOOGLE_OAUTH_CLIENT_SECRET: "your_gmail_oauth_client_secret"
  TOKEN_ENCRYPTION_KEY: "replace_with_long_random_secret"
  GMAIL_OAUTH_STATE_SECRET: "replace_with_long_random_secret"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcb-api
  namespace: life-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lcb-api
  template:
    metadata:
      labels:
        app: lcb-api
    spec:
      containers:
        - name: api
          image: lcb-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: API_PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: LLM_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lcb-api
  namespace: life-command
spec:
  selector:
    app: lcb-api
  ports:
    - port: 4000
      targetPort: 4000

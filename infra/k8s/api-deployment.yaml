apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcb-api
  namespace: life-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lcb-api
  template:
    metadata:
      labels:
        app: lcb-api
    spec:
      containers:
        - name: api
          image: ghcr.io/madhuboyin/life-command-bar-poc/api:f1b4840
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: API_PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: LLM_API_KEY
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: TOKEN_ENCRYPTION_KEY
            - name: GMAIL_OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: GMAIL_OAUTH_STATE_SECRET
            - name: APP_URL
              value: "https://lcb.contracttocozy.com"
            - name: GMAIL_OAUTH_REDIRECT_URI
              value: "https://api-lcb.contracttocozy.com/api/gmail/oauth/callback"
            - name: GMAIL_OAUTH_SUCCESS_REDIRECT
              value: "https://lcb.contracttocozy.com/settings"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lcb-api
  namespace: life-command
spec:
  selector:
    app: lcb-api
  ports:
    - port: 4000
      targetPort: 4000

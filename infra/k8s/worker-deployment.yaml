apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcb-worker
  namespace: life-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lcb-worker
  template:
    metadata:
      labels:
        app: lcb-worker
    spec:
      containers:
        - name: worker
          image: lcb-worker:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lcb-secrets
                  key: LLM_API_KEY

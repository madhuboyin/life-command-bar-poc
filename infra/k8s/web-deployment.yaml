apiVersion: apps/v1
kind: Deployment
metadata:
  name: lcb-web
  namespace: life-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lcb-web
  template:
    metadata:
      labels:
        app: lcb-web
    spec:
      containers:
        - name: web
          image: ghcr.io/madhuboyin/life-command-bar-poc/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api-lcb.contracttocozy.com/api"
            - name: API_BASE_URL
              value: "https://api-lcb.contracttocozy.com/api"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: lcb-web
  namespace: life-command
spec:
  selector:
    app: lcb-web
  ports:
    - port: 3000
      targetPort: 3000
